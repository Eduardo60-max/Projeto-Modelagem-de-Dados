<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Supabase CSV Manager</title>

  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f4f4;
      padding: 30px;
    }

    .container {
      background: white;
      max-width: 1100px;
      margin: auto;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    #botoesTabelas {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 10px;
      margin-bottom: 20px;
    }

    button {
      padding: 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      color: white;
      font-size: 15px;
    }

    .btnTabela {
      background: #2563eb;
    }

    .btnTabela:hover {
      background: #1d4ed8;
    }

    .acoes {
      display: flex;
      gap: 10px;
      margin-top: 15px;
      flex-wrap: wrap;
    }

    .acoes button {
      flex: 1;
      min-width: 150px;
    }

    .carregar {
      background: #ea580c;
    }

    .mostrar {
      background: #0891b2;
    }

    .limpar {
      background: #dc2626;
    }

    #status {
      margin-top: 20px;
      padding: 12px;
      background: #eee;
      border-radius: 6px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background: white;
    }

    th,
    td {
      border: 1px solid #ccc;
      padding: 10px;
      text-align: left;
      font-size: 14px;
    }

    th {
      background: #ddd;
    }

    input {
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>Gerenciador CSV + Supabase</h1>

    <!-- BOTÕES DAS TABELAS -->
    <div id="botoesTabelas"></div>

    <!-- INPUT CSV -->
    <input type="file" id="csvFile" accept=".csv">

    <!-- AÇÕES -->
    <div class="acoes">

      <button class="carregar" onclick="carregarCSV()">
        Carregar CSV
      </button>

      <button class="mostrar" onclick="mostrarTabela()">
        Mostrar Dados
      </button>

      <button class="limpar" onclick="limparTabela()">
        Limpar Tabela
      </button>

    </div>

    <!-- STATUS -->
    <div id="status">
      Nenhuma tabela selecionada.
    </div>

    <!-- RESULTADO -->
    <div id="resultado"></div>

  </div>

  <script>

    // =========================================
    // CONFIG SUPABASE
    // =========================================

    const SUPABASE_URL = "https://slczoexfrujtqimumrhv.supabase.co";

    // COLE AQUI SUA CHAVE "anon public"
    const SUPABASE_KEY = "sb_publishable_U_mpgcL_DwBGqXIvHcKGsg_e6FDWuHq";

    // =========================================
    // TABELAS EXISTENTES
    // =========================================

    const tabelas = [

      "artigos",

      "author",

      "author_keyword",

      "index_keyword",

      "author_artigos",

      "artigo_keyword",

      "artigo_index"
    ];

    let tabelaSelecionada = "";

    // =========================================
    // CRIAR BOTÕES DAS TABELAS
    // =========================================

    function criarBotoesTabelas() {

      const div = document.getElementById("botoesTabelas");

      tabelas.forEach(nomeTabela => {

        const botao = document.createElement("button");

        botao.innerText = nomeTabela;

        botao.className = "btnTabela";

        botao.onclick = () => selecionarTabela(nomeTabela);

        div.appendChild(botao);
      });
    }

    // =========================================
    // SELECIONAR TABELA
    // =========================================

    function selecionarTabela(nomeTabela) {

      tabelaSelecionada = nomeTabela;

      document.getElementById("status").innerHTML =
        `Tabela selecionada: <b>${nomeTabela}</b>`;
    }

    // =========================================
    // MOSTRAR TABELA
    // =========================================

    async function mostrarTabela() {

      if (tabelaSelecionada === "") {

        alert("Selecione uma tabela!");

        return;
      }

      try {

        const resposta = await fetch(
          `${SUPABASE_URL}/rest/v1/${tabelaSelecionada}?select=*`,
          {
            method: "GET",

            headers: {
              "apikey": SUPABASE_KEY,
              "Authorization": `Bearer ${SUPABASE_KEY}`
            }
          }
        );

        const dados = await resposta.json();

        console.log(dados);

        criarTabelaHTML(dados);

      } catch (erro) {

        console.error(erro);

        document.getElementById("status").innerHTML =
          "Erro ao buscar tabela.";
      }
    }

    // =========================================
    // CRIAR TABELA HTML
    // =========================================

    function criarTabelaHTML(dados) {

      const resultado = document.getElementById("resultado");

      resultado.innerHTML = "";

      if (!dados || dados.length === 0) {

        resultado.innerHTML = "<h3>Tabela vazia</h3>";

        return;
      }

      let tabela = "<table>";

      // CABEÇALHO

      tabela += "<tr>";

      Object.keys(dados[0]).forEach(coluna => {

        tabela += `<th>${coluna}</th>`;
      });

      tabela += "</tr>";

      // LINHAS

      dados.forEach(item => {

        tabela += "<tr>";

        Object.values(item).forEach(valor => {

          tabela += `<td>${valor}</td>`;
        });

        tabela += "</tr>";
      });

      tabela += "</table>";

      resultado.innerHTML = tabela;
    }

    // =========================================
    // CARREGAR CSV
    // =========================================

    async function carregarCSV() {

      if (tabelaSelecionada === "") {

        alert("Selecione uma tabela!");

        return;
      }

      const arquivo = document.getElementById("csvFile").files[0];

      if (!arquivo) {

        alert("Escolha um arquivo CSV!");

        return;
      }

      const texto = await arquivo.text();

      const linhas = texto.trim().split("\n");

      const colunas = linhas[0].split(",");

      let dados = [];

      for (let i = 1; i < linhas.length; i++) {

        if (linhas[i].trim() === "") continue;

        const valores = linhas[i].split(",");

        let objeto = {};

        colunas.forEach((coluna, index) => {

          objeto[coluna.trim()] =
            valores[index]?.trim() || null;
        });

        dados.push(objeto);
      }

      console.log(dados);

      try {

        const resposta = await fetch(
          `${SUPABASE_URL}/rest/v1/${tabelaSelecionada}`,
          {
            method: "POST",

            headers: {
              "Content-Type": "application/json",
              "apikey": SUPABASE_KEY,
              "Authorization": `Bearer ${SUPABASE_KEY}`,
              "Prefer": "return=representation"
            },

            body: JSON.stringify(dados)
          }
        );

        if (resposta.ok) {

          document.getElementById("status").innerHTML =
            `CSV enviado para <b>${tabelaSelecionada}</b> com sucesso!`;

          mostrarTabela();

        } else {

          const erro = await resposta.text();

          document.getElementById("status").innerHTML =
            `Erro: ${erro}`;
        }

      } catch (erro) {

        console.error(erro);

        document.getElementById("status").innerHTML =
          "Erro ao enviar CSV.";
      }
    }

    // =========================================
    // LIMPAR TABELA
    // =========================================

    async function limparTabela() {

      if (tabelaSelecionada === "") {

        alert("Selecione uma tabela!");

        return;
      }

      const confirmar = confirm(
        `Deseja limpar a tabela ${tabelaSelecionada}?`
      );

      if (!confirmar) return;

      let colunaID = "id";

      if (tabelaSelecionada === "author") {
        colunaID = "idauthor";
      }

      if (tabelaSelecionada === "author_keyword") {
        colunaID = "idkeyword";
      }

      if (tabelaSelecionada === "index_keyword") {
        colunaID = "idindex";
      }

      try {

        const resposta = await fetch(
          `${SUPABASE_URL}/rest/v1/${tabelaSelecionada}?${colunaID}=gt.0`,
          {
            method: "DELETE",

            headers: {
              "apikey": SUPABASE_KEY,
              "Authorization": `Bearer ${SUPABASE_KEY}`
            }
          }
        );

        if (resposta.ok) {

          document.getElementById("status").innerHTML =
            `Tabela <b>${tabelaSelecionada}</b> limpa com sucesso!`;

          document.getElementById("resultado").innerHTML = "";

        } else {

          const erro = await resposta.text();

          document.getElementById("status").innerHTML =
            `Erro: ${erro}`;
        }

      } catch (erro) {

        console.error(erro);

        document.getElementById("status").innerHTML =
          "Erro ao limpar tabela.";
      }
    }

    // =========================================
    // INICIAR
    // =========================================

    criarBotoesTabelas();

  </script>

</body>

</html>
